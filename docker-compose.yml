version: '2.1'

networks:
    pia_network:
        enable_ipv6: false
        driver: bridge
        ipam:
            config:
                - subnet: 192.168.22.0/24

services:

    vpn:
        container_name: pia
        hostname: pia
        image: itsdaspecialk/pia-openvpn:latest
        restart: unless-stopped
        volumes:
            - ${STORAGE_DIRECTORY}/docker/config/pia/auth.conf:/pia/auth.conf
        cap_add:
            - NET_ADMIN
        dns:
            - 1.1.1.1
            - 1.0.0.1
        sysctls:
            - net.ipv6.conf.all.disable_ipv6=1
        environment:
            - REGION=US Texas
            - PGID
            - PUID
            - TZ
        networks:
            pia_network:
                ipv4_address: 192.168.22.50
        command: "--auth-user-pass auth.conf"

    torrent:
        container_name: transmission
        image: linuxserver/transmission:latest
        restart: unless-stopped
        volumes:
            - ${STORAGE_DIRECTORY}/docker/config/transmission:/config
            - ${STORAGE_DIRECTORY}/downloads/complete:${STORAGE_DIRECTORY}/downloads/complete
            - ${STORAGE_DIRECTORY}/downloads/incomplete:${STORAGE_DIRECTORY}/downloads/incomplete
            - ${STORAGE_DIRECTORY}/downloads/watch:${STORAGE_DIRECTORY}/downloads/watch
        environment:
            - TZ
            - PGID
            - PUID
        network_mode: service:vpn
        sysctls:
            - net.ipv6.conf.all.disable_ipv6=1
        depends_on:
            - vpn
    
    proxy:
        container_name: nginx
        hostname: nginx
        image: nginx:latest
        restart: unless-stopped
        volumes:
            - ${STORAGE_DIRECTORY}/docker/config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
        ports:
            - "9091:9091"
        environment:
            - TZ
            - PGID
            - PUID
        networks:
            pia_network:
                ipv4_address: 192.168.22.51
        sysctls:
            - net.ipv6.conf.all.disable_ipv6=1   

    sonarr:
        container_name: sonarr
        hostname: sonarr
        image: linuxserver/sonarr:latest        
        restart: unless-stopped
        volumes:
            - ${STORAGE_DIRECTORY}/docker/config/sonarr:/config
            - ${STORAGE_DIRECTORY}/downloads/complete:${STORAGE_DIRECTORY}/downloads/complete
            - ${STORAGE_DIRECTORY}/downloads/incomplete:${STORAGE_DIRECTORY}/downloads/incomplete
            - ${STORAGE_DIRECTORY}/video/tv:${STORAGE_DIRECTORY}/video/tv
            - /etc/localtime:/etc/localtime:ro
        environment:
            - TZ
            - PGID
            - PUID
        ports:
            - "8989:8989"
        networks:
            pia_network:
                ipv4_address: 192.168.22.52
        sysctls:
            - net.ipv6.conf.all.disable_ipv6=1

    radarr:
        container_name: radarr
        hostname: radarr
        image: linuxserver/radarr:latest        
        restart: unless-stopped
        volumes:
            - ${STORAGE_DIRECTORY}/docker/config/radarr:/config
            - ${STORAGE_DIRECTORY}/downloads/complete:${STORAGE_DIRECTORY}/downloads/complete
            - ${STORAGE_DIRECTORY}/downloads/incomplete:${STORAGE_DIRECTORY}/downloads/incomplete
            - ${STORAGE_DIRECTORY}/video/movie:${STORAGE_DIRECTORY}/video/movie
            - /etc/localtime:/etc/localtime:ro
        environment:
            - TZ
            - PGID
            - PUID
        ports:
            - "7878:7878"
        sysctls:
            - net.ipv6.conf.all.disable_ipv6=1
        networks:
            pia_network:
                ipv4_address: 192.168.22.53

    jackett:
        container_name: jackett
        hostname: jackett
        image: linuxserver/jackett:latest
        restart: unless-stopped
        volumes:
            - ${STORAGE_DIRECTORY}/docker/config/jackett:/config
            - ${STORAGE_DIRECTORY}/downloads/complete:${STORAGE_DIRECTORY}/downloads/complete
            - /etc/localtime:/etc/localtime:ro
        environment:
            - TZ
            - PGID
            - PUID
        ports:
            - "9117:9117"
        sysctls:
            - net.ipv6.conf.all.disable_ipv6=1
        networks:
            pia_network:
                ipv4_address: 192.168.22.54
    
    plex:
        container_name: plex
        hostname: plex
        image: adnanklink/plex-norelay-hwdecoding
        restart: unless-stopped
        network_mode: host
        mem_limit: 32768m
        sysctls:
            - net.ipv6.conf.all.disable_ipv6=1
        volumes:
            - ${STORAGE_DIRECTORY}/docker/config/plex/plex_db:/config
            - /dev/shm:/transcode
            - ${STORAGE_DIRECTORY}/video/movie:/mnt/storage/video/movie
            - ${STORAGE_DIRECTORY}/video/tv:/mnt/storage/video/tv
            - ${STORAGE_DIRECTORY}/audio:/mnt/storage/audio
            - ${STORAGE_DIRECTORY}/photos:/mnt/storage/photos
        environment:
            - TZ
            - PGID
            - PUID
            - VERSION=latest
            - NVIDIA_VISIBLE_DEVICES=all
    tautulli:
        image: linuxserver/tautulli
        container_name: tautulli
        environment:
            - PUID
            - PGID
            - TZ
        volumes:
            - ${STORAGE_DIRECTORY}/docker/config/tautulli:/config
            - ${STORAGE_DIRECTORY}/docker/config/plex/plex_db/Library/Application\ Support/Plex\ Media\ Server/Logs:/logs
        ports:
            - 8181:8181
        network_mode: host
        mem_limit: 4096m
        restart: unless-stopped
